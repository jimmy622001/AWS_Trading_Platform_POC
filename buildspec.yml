version: 0.2

phases:
  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws --version
      - echo Build started on `date`
      - echo $AWS_DEFAULT_REGION
      - echo "Installing security scanning tools..."
      - pip install checkov
      - curl -sSL https://github.com/terraform-linters/tflint/releases/latest/download/tflint_linux_amd64.zip -o tflint.zip && unzip tflint.zip && chmod +x tflint && mv tflint /usr/local/bin/
      - echo "Running Terraform validation..."
      - terraform init -backend=false
      - terraform validate
      - terraform fmt -check -recursive

  build:
    commands:
      - echo Build started on `date`
      - echo "Running security scans..."
      - echo "Running TFLint..."
      - tflint --init
      - tflint --config=.tflint.hcl || true
      - echo "Running Checkov..."
      - checkov --directory . --framework terraform --quiet --compact || true
      - echo "Running Terrascan..."
      - if command -v terrascan; then terrascan scan -d . -o human || true; fi
      - echo "Building the application..."
      - echo "Building sample application"
      - echo "Running automated tests..."
      - echo "Tests completed successfully"

  post_build:
    commands:
      - echo Build completed on `date`
      - echo "Security scan results:"
      - echo "All scans completed - review output above for any issues"

artifacts:
  files:
    - '**/*'
  discard-paths: no

cache:
  paths:
    - '/root/.terraform/**/*'
    - '/usr/local/bin/tflint'
